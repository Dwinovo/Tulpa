<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 760px; height: 464px; overflow: hidden; background: #000; }
      /* BlockFrame atoms: 8px black border (4px@1x), square corners, candy pastels */
      .panel {
        position: absolute; inset: 0;
        background: #FFFDF5;                       /* offwhite ground */
        border: 8px solid #000;
        background-image: radial-gradient(rgba(0,0,0,0.10) 2px, transparent 2px);  /* faint dot grid */
        background-size: 48px 48px;
        background-position: 8px 8px;
      }
      .header {
        position: absolute; top: 8px; left: 8px; right: 8px; height: 36px;
        background: #C0F7FE;                       /* blue chrome band */
        border-bottom: 8px solid #000;
      }
      .badge {                                     /* tilted yellow grid-puncture, bottom-right */
        position: absolute; right: 18px; bottom: 18px; width: 34px; height: 34px;
        background: #F7CB46; border: 6px solid #000; transform: rotate(-8deg);
        box-shadow: 8px 8px 0 #000;
      }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="1"
         data-width="760" data-height="464"
         style="position: relative; width: 760px; height: 464px; overflow: hidden;">
      <div class="clip" data-start="0" data-duration="1" data-track-index="1"
           style="position: absolute; inset: 0;">
        <div class="panel">
          <div class="header"></div>
          <div class="badge"></div>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
