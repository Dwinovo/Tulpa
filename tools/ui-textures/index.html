<!doctype html><html><head><meta charset="UTF-8"/>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:12px;height:30px;overflow:hidden;background:#00000000}
.c{position:absolute;inset:0;background:#CBA87B;border:3px solid #352818}
.sage{position:absolute;left:3px;right:3px;top:6px;height:13px;background:#6E8F66}
.line{position:absolute;left:3px;right:3px;top:19px;height:3px;background:#352818}</style></head>
<body><div id="root" data-composition-id="main" data-start="0" data-duration="1" data-width="12" data-height="30"
style="position:relative;width:12px;height:30px;overflow:hidden">
<div class="clip" data-start="0" data-duration="1" data-track-index="1" style="position:absolute;inset:0">
<div class="c"></div><div class="sage"></div><div class="line"></div></div></div>
<script>window.__timelines=window.__timelines||{};window.__timelines["main"]=gsap.timeline({paused:true})</script></body></html>
