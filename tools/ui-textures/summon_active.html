<!doctype html><html><head><meta charset="UTF-8"/>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:26px;height:26px;overflow:hidden;background:#00000000}
.c{position:absolute;inset:0;background:#D8B98A;border:2px solid #E3A23A}
.hb{position:absolute;left:7px;right:7px;top:11px;height:4px;background:#E3A23A}
.vb{position:absolute;top:7px;bottom:7px;left:11px;width:4px;background:#E3A23A}</style></head>
<body><div id="root" data-composition-id="main" data-start="0" data-duration="1" data-width="26" data-height="26"
style="position:relative;width:26px;height:26px;overflow:hidden">
<div class="clip" data-start="0" data-duration="1" data-track-index="1" style="position:absolute;inset:0"><div class="c"><div class="hb"></div><div class="vb"></div></div></div></div>
<script>window.__timelines=window.__timelines||{};window.__timelines["main"]=gsap.timeline({paused:true})</script></body></html>
